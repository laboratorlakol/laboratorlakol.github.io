<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* General Page Setup */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Black screen */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Logo and Glow Effect */
        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            /* * IF YOU ARE USING AN IMAGE:
             * Delete the text properties below and uncomment the filter line to apply 
             * the green glow directly to a transparent image (like a PNG).
             */
            /* filter: drop-shadow(0 0 20px #00ff00); */
            
            /* Text placeholder styling */
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            /* Bright green text glow */
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 40px #00ff00, 0 0 80px #00ff00;
        }

        /* Infinite Loading Bar */
        .loading-container {
            width: 300px;
            height: 4px;
            background-color: #222; /* Dark track */
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
        }

        .loading-bar {
            width: 40%;
            height: 100%;
            background-color: #00ff00; /* Green bar */
            position: absolute;
            left: -40%;
            border-radius: 4px;
            box-shadow: 0 0 10px #00ff00;
            /* The infinite animation */
            animation: indeterminate 1.5s infinite ease-in-out;
        }

        /* Keyframes for the bar moving back and forth/through */
        @keyframes indeterminate {
            0% { left: -40%; width: 30%; }
            50% { left: 40%; width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        /* Coming Soon Text */
        .coming-soon-text {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #ccc;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* Discord Icon Styling */
        .discord-link {
            display: inline-block;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        /* Hover effect for the Discord button */
        .discord-link:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px #5865F2);
        }

        .discord-icon {
            fill: #5865F2; /* Official Discord Blurple */
            width: 45px;
            height: 45px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo">LOGO</div>
    </div>

    <div class="loading-container">
        <div class="loading-bar"></div>
    </div>

    <div class="coming-soon-text">Coming Soon...</div>

    <a href="https://discord.gg/YOUR_INVITE_LINK_HERE" target="_blank" class="discord-link" title="Join our Discord">

</body>
</html>
