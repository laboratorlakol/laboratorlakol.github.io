<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* General Page Setup */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Logo and Subtle Glow Effect */
        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            max-width: 350px;
            height: auto;
            /* Changed to a much softer, semi-transparent green glow */
            filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.4));
        }

        /* Coming Soon Text */
        .coming-soon-text {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #ccc;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        /* Animated typing dots for the text */
        .text-dots::after {
            content: '';
            display: inline-block;
            width: 20px; /* Reserves space so the text doesn't jump */
            text-align: left;
            animation: type-dots 1.5s infinite steps(4, end);
        }

        @keyframes type-dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        /* Dots Loading Bar */
        .dot-loader {
            display: flex;
            gap: 10px;
            margin-bottom: 50px;
        }

        .loader-dot {
            width: 12px;
            height: 12px;
            background-color: #00ff00;
            border-radius: 50%;
            /* Subtle glow for the loading dots */
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.6);
            animation: pulse 1.4s infinite ease-in-out both;
        }

        /* Stagger the animation for each dot */
        .loader-dot:nth-child(1) { animation-delay: -0.32s; }
        .loader-dot:nth-child(2) { animation-delay: -0.16s; }
        .loader-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Discord Icon Styling */
        .discord-link {
            display: inline-block;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .discord-link:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px #5865F2);
        }

        .discord-icon {
            fill: #5865F2;
            width: 45px;
            height: 45px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="faded.png" alt="Logo" class="logo">
    </div>

    <div class="coming-soon-text">
        Coming Soon<span class="text-dots"></span>
    </div>

    <div class="dot-loader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
    </div>

    <a href="https://discord.gg/YOUR_INVITE_LINK_HERE" target="_blank" class="discord-link" title="Join our Discord">

</body>
</html>
